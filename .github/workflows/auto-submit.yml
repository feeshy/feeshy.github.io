name: Auto-submit URLs to Search Engines

on:
  schedule:
    - cron: '28 18 * * *'
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: url-submission
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run submissions
        env:
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}
          GOOGLE_INDEXING_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}
        run: |
          set -e
          
          # 检测所有队列文件是否均不存在或为空，若均为空则直接退出
          if [ ! -s bing_queue.txt ] && [ ! -s google_queue.txt ] && [ ! -s baidu_queue.txt ]; then
            echo "All queues are empty or missing. Skipping submission and exiting successfully."
            exit 0
          fi
          
          echo "Active queues found. Installing googleapis dependency..."
          npm install googleapis
          
          # 1. 提交 Bing IndexNow
          if [ -f bing_queue.txt ] && [ -s bing_queue.txt ]; then
            node .github/workflows/scripts/bing-submit.js
          else
            echo "Bing queue is empty."
          fi
          
          # 2. 提交 Google Indexing API
          if [ -f google_queue.txt ] && [ -s google_queue.txt ]; then
            node .github/workflows/scripts/google-submit.js
          else
            echo "Google queue is empty."
          fi
          
          # 3. 提交 百度
          if [ -f baidu_queue.txt ] && [ -s baidu_queue.txt ]; then
            node .github/workflows/scripts/baidu-submit.js
          else
            echo "Baidu queue is empty."
          fi

          # 4. 判断并提交队列变化
          if [ -n "$(git status --porcelain *_queue.txt)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add *_queue.txt
            git commit -m "Auto-update queues after submission [skip ci]"
            git push origin HEAD:url-submission
          else
            echo "No queue updates to push."
          fi
