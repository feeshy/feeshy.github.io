name: Deploy Jekyll site to Pages

on:
  # 仅在向默认分支 push 代码时触发
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 获取上一次提交以对比文件差异
          lfs: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@8575951200e472d5f2d95c625da0c7bec8217c42 # v1.161.0
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          
      # 【自动生成验证文件】在部署前，动态将 Secret 写入编译输出的根目录
      - name: Generate IndexNow Key File
        run: echo "${{ secrets.BING_INDEXNOW_KEY }}" > _site/${{ secrets.BING_INDEXNOW_KEY }}.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 同样需要历史记录来识别修改的文件
          lfs: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Submit Changed URLs to IndexNow
        run: |
          # 1. 提取变更文件的文件名（不含路径和扩展名），例如 2026-06-12-hello.md -> hello
          CHANGED_NAMES=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(md|markdown|html)$' | sed -E 's|.*/||' | sed -E 's|^([0-9]{4}-[0-9]{2}-[0-9]{2}-)||' | sed -E 's|\.(md|markdown|html)$||' || true)
          
          # 【核心逻辑】如果没有检测到具体的文章或页面变更，直接优雅退出，跳过提交
          if [ -z "$CHANGED_NAMES" ]; then
            echo "No relevant article or page changes detected. Skipping IndexNow submission safely."
            exit 0
          fi

          # 2. 如果有文章变动，获取刚才部署好的线上最新的 sitemap.xml 进行反查
          echo "Fetching sitemap to resolve custom permalinks..."
          curl -s https://feeshy.top/sitemap.xml > remote_sitemap.xml

          MATCHED_URLS=""
          for name in $CHANGED_NAMES; do
            # 从 sitemap 中捞出包含该文件名的完整 <loc> 标签内容并提取真实 URL
            FOUND_URL=$(grep -ioE "<loc>[^<]*$name[^<]*</loc>" remote_sitemap.xml | sed -E 's|</?loc>||gi' | head -n 1 || true)
            if [ ! -z "$FOUND_URL" ]; then
              MATCHED_URLS="$MATCHED_URLS\"$FOUND_URL\","
            fi
          done

          # 去掉末尾逗号
          URL_LIST_JSON=$(echo "$MATCHED_URLS" | sed 's/,$//')

          # 如果改了文章，但由于某些原因在 sitemap 里反查失败，才用 sitemap 链接进行安全兜底
          if [ -z "$URL_LIST_JSON" ]; then
            echo "Articles changed but URLs not found in sitemap. Fallback to sitemap link."
            URL_LIST_JSON='"https://feeshy.top/sitemap.xml"'
          fi

          # 3. 构造 JSON 并发送请求
          echo "Submitting URLs: [$URL_LIST_JSON]"
          
          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{
            \"host\": \"feeshy.top\",
            \"key\": \"${{ secrets.BING_INDEXNOW_KEY }}\",
            \"keyLocation\": \"https://feeshy.top/${{ secrets.BING_INDEXNOW_KEY }}.txt\",
            \"urlList\": [$URL_LIST_JSON]
          }"