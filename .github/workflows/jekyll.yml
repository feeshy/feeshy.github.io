name: Deploy Jekyll site to Pages

on:
  # 仅在向默认分支 push 代码时触发
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2 # 获取上一次提交以对比文件差异

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1 # v1.161.0
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
        
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          
      # 【自动生成验证文件】在部署前，动态将 Secret 写入编译输出的根目录
      - name: Generate IndexNow Key File
        run: echo "${{ secrets.BING_INDEXNOW_KEY }}" > _site/${{ secrets.BING_INDEXNOW_KEY }}.txt

      - name: Upload built sitemap
        uses: actions/upload-artifact@v4
        with:
          name: built_sitemap
          path: _site/sitemap-content.xml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # 拉全量历史，确保「上次成功提交的 SHA」一定能在本地 history 里找到
          fetch-depth: 0

      - name: Download built sitemap
        uses: actions/download-artifact@v4
        with:
          name: built_sitemap
          path: built_sitemap_dir

      # 下载上一次 workflow run 成功存下来的「已提交 SHA」，作为本次 diff 起点
      # 第一次跑 / artifact 已被 GC 时不会让 workflow 失败
      - name: Download last successful SHA
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: jekyll.yml
          name: last_indexnow_sha
          path: last_indexnow_sha_artifact
          if_no_artifact_found: warn

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Queue Changed URLs for Submission
        run: |
          # 0. 拿到「上次成功提交过 IndexNow 的 commit」作为 diff 起点；
          #    拿不到（比如 workflow 第一次跑、artifact 过期、rebase 强推后旧 SHA 找不到）就 fallback 到 HEAD~1
          LAST_SHA="HEAD~1"
          if [ -f last_indexnow_sha_artifact/last_indexnow_sha ]; then
            CANDIDATE=$(cat last_indexnow_sha_artifact/last_indexnow_sha)
            if git cat-file -e "$CANDIDATE^{commit}" 2>/dev/null; then
              LAST_SHA="$CANDIDATE"
              echo "Using last successful SHA as diff base: $LAST_SHA"
            else
              echo "Stored SHA $CANDIDATE not in current history, falling back to HEAD~1"
            fi
          else
            echo "No prior SHA found, falling back to HEAD~1"
          fi

          # 1. 提取变更文件的文件名（不含路径和扩展名），例如 2026-06-12-hello.md -> hello
          #    用 # 做 sed 分隔符，避免 .md / .markdown / .html 里的 | 干扰解析
          #    --diff-filter=ACMRT 表示只取 Added / Copied / Modified / Renamed / Type-changed，排除 Deleted
          #    （删掉的页面再提交 URL 给 IndexNow 没意义，Bing 抓也抓不到）
          CHANGED_NAMES=$(git diff --name-only --diff-filter=ACMRT "$LAST_SHA" HEAD | grep -E '\.(md|markdown|html)$' | sed -E 's#.*/##' | sed -E 's#^[0-9]{4}-[0-9]{2}-[0-9]{2}-##' | sed -E 's#\.(md|markdown|html)$##' || true)
          
          # 【核心逻辑】如果没有检测到具体的文章或页面变更，直接优雅退出，跳过提交
          if [ -z "$CHANGED_NAMES" ]; then
            echo "No relevant article or page changes detected. Skipping queue updates safely."
            exit 0
          fi

          # 保存当前的 commit SHA 供下一步持久化
          PROCESSED_SHA=$(git rev-parse HEAD)

          # 2. 使用本地构建的 sitemap-content.xml 反查真实 URL
          echo "Resolving custom permalinks using built sitemap..."
          cp built_sitemap_dir/sitemap-content.xml remote_sitemap.xml

          MATCHED_URLS=()
          for name in $CHANGED_NAMES; do
            # 从 sitemap 中捞出包含该文件名的完整 <loc> 标签内容并提取真实 URL
            FOUND_URL=$(grep -ioE "<loc>[^<]*$name[^<]*</loc>" remote_sitemap.xml | sed -E 's|</?loc>||gi' | head -n 1 || true)
            if [ ! -z "$FOUND_URL" ]; then
              MATCHED_URLS+=("$FOUND_URL")
            fi
          done

          # 如果改了文章但在 sitemap 中反查不到，则直接退出，不 fallback 到 sitemap.xml
          if [ ${#MATCHED_URLS[@]} -eq 0 ]; then
            echo "No matched URLs found in sitemap. Skipping queue updates safely."
            exit 0
          fi

          # 输出为单行列表
          printf "%s\n" "${MATCHED_URLS[@]}" > new_urls.txt
          echo "New URLs to queue:"
          cat new_urls.txt
          echo ""

          # 3. 切换到 url-submission 分支并更新队列（头部追加 + 去重，实现 LIFO 后进先出）
          echo "Switching to url-submission branch..."
          git checkout url-submission

          for queue in bing_queue.txt google_queue.txt baidu_queue.txt; do
            touch "$queue"
            
            # 使用临时文件实现 LIFO 头部追加和去重
            cat new_urls.txt > temp.txt
            cat "$queue" >> temp.txt
            awk '!seen[$0]++' temp.txt > "$queue"
            rm temp.txt
          done

          # 4. 提交修改并推送至 url-submission 分支
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bing_queue.txt google_queue.txt baidu_queue.txt

          if [ -n "$(git status --porcelain *_queue.txt)" ]; then
            git commit -m "Queue new URLs for indexing [skip ci]"
            git push origin HEAD:url-submission
          else
            echo "No new unique URLs to queue."
          fi

          # 5. 回写当前 processed SHA 供后续 of Persist SHA artifact 步骤读取
          echo "$PROCESSED_SHA" > last_indexnow_sha

        shell: bash

      - name: Persist SHA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: last_indexnow_sha
          path: last_indexnow_sha
          # IndexNow 失败时 SHA 文件可能不存在；用 warn 不要 error，避免连带 deploy 挂红
          if-no-files-found: warn
          retention-days: 90

