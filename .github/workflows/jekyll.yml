name: Deploy Jekyll site to Pages

on:
  # 仅在向默认分支 push 代码时触发
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2 # 获取上一次提交以对比文件差异

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1 # v1.161.0
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
        
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          
      # 【自动生成验证文件】在部署前，动态将 Secret 写入编译输出的根目录
      - name: Generate IndexNow Key File
        run: echo "${{ secrets.BING_INDEXNOW_KEY }}" > _site/${{ secrets.BING_INDEXNOW_KEY }}.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # 拉全量历史，确保「上次成功提交的 SHA」一定能在本地 history 里找到
          fetch-depth: 0

      # 下载上一次 workflow run 成功存下来的「已提交 SHA」，作为本次 diff 起点
      # 第一次跑 / artifact 已被 GC 时不会让 workflow 失败
      - name: Download last successful SHA
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: jekyll.yml
          name: last_indexnow_sha
          path: last_indexnow_sha_artifact
          if_no_artifact_found: warn

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit Changed URLs to IndexNow
        run: |
          # 0. 拿到「上次成功提交过 IndexNow 的 commit」作为 diff 起点；
          #    拿不到（比如 workflow 第一次跑、artifact 过期、rebase 强推后旧 SHA 找不到）就 fallback 到 HEAD~1
          LAST_SHA="HEAD~1"
          if [ -f last_indexnow_sha_artifact/last_indexnow_sha ]; then
            CANDIDATE=$(cat last_indexnow_sha_artifact/last_indexnow_sha)
            if git cat-file -e "$CANDIDATE^{commit}" 2>/dev/null; then
              LAST_SHA="$CANDIDATE"
              echo "Using last successful SHA as diff base: $LAST_SHA"
            else
              echo "Stored SHA $CANDIDATE not in current history, falling back to HEAD~1"
            fi
          else
            echo "No prior SHA found, falling back to HEAD~1"
          fi

          # 1. 提取变更文件的文件名（不含路径和扩展名），例如 2026-06-12-hello.md -> hello
          #    用 # 做 sed 分隔符，避免 .md / .markdown / .html 里的 | 干扰解析
          CHANGED_NAMES=$(git diff --name-only "$LAST_SHA" HEAD | grep -E '\.(md|markdown|html)$' | sed -E 's#.*/##' | sed -E 's#^[0-9]{4}-[0-9]{2}-[0-9]{2}-##' | sed -E 's#\.(md|markdown|html)$##' || true)
          
          # 【核心逻辑】如果没有检测到具体的文章或页面变更，直接优雅退出，跳过提交
          if [ -z "$CHANGED_NAMES" ]; then
            echo "No relevant article or page changes detected. Skipping IndexNow submission safely."
            exit 0
          fi

          # 2. 如果有文章变动，获取刚才部署好的线上最新的 sitemap.xml 进行反查
          echo "Fetching sitemap to resolve custom permalinks..."
          curl -s https://feeshy.top/sitemap.xml > remote_sitemap.xml

          MATCHED_URLS=""
          for name in $CHANGED_NAMES; do
            # 从 sitemap 中捞出包含该文件名的完整 <loc> 标签内容并提取真实 URL
            FOUND_URL=$(grep -ioE "<loc>[^<]*$name[^<]*</loc>" remote_sitemap.xml | sed -E 's|</?loc>||gi' | head -n 1 || true)
            if [ ! -z "$FOUND_URL" ]; then
              MATCHED_URLS="$MATCHED_URLS\"$FOUND_URL\","
            fi
          done

          # 去掉末尾逗号
          URL_LIST_JSON=$(echo "$MATCHED_URLS" | sed 's/,$//')

          # 如果改了文章，但由于某些原因在 sitemap 里反查失败，才用 sitemap 链接进行安全兜底
          if [ -z "$URL_LIST_JSON" ]; then
            echo "Articles changed but URLs not found in sitemap. Fallback to sitemap link."
            URL_LIST_JSON='"https://feeshy.top/sitemap.xml"'
          fi

          # 3. 构造 JSON 并发送请求
          echo "Submitting URLs: [$URL_LIST_JSON]"

          # 把响应落盘，下面好判断是否真提交成功
          HTTP_CODE=$(curl -sS -o indexnow_response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"feeshy.top\",
              \"key\": \"${{ secrets.BING_INDEXNOW_KEY }}\",
              \"keyLocation\": \"https://feeshy.top/${{ secrets.BING_INDEXNOW_KEY }}.txt\",
              \"urlList\": [$URL_LIST_JSON]
            }")
          echo "IndexNow HTTP $HTTP_CODE"
          cat indexnow_response.txt || true

          # IndexNow 成功响应是 200/202；其他都算失败，不更新 SHA
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "IndexNow submission failed; not updating last_indexnow_sha."
            exit 1
          fi

      # 4. 把这次成功跑完的 commit SHA 存为 artifact，供下一次 workflow run 拉取做 diff 起点
      - name: Upload last successful SHA
        if: success()
        run: git rev-parse HEAD > last_indexnow_sha
        shell: bash
      - name: Persist SHA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: last_indexnow_sha
          path: last_indexnow_sha
          if-no-files-found: error
          retention-days: 90