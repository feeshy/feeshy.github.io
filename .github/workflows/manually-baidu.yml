name: Manually submit URLs to Baidu

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to Baidu
        env:
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$BAIDU_TOKEN" ]; then
            echo "❌ Secret BAIDU_TOKEN 未设置"
            exit 1
          fi

          # 从相对路径生成绝对 URL
          cat > urls.txt << 'EOF'
          https://feeshy.top/tech/copyleft-license
          https://feeshy.top/tech/adaptive-svg-for-dark-mode
          https://feeshy.top/prose/sleepless-night
          https://feeshy.top/prose/children-of-the-sun
          https://feeshy.top/smzdm/dji-mic-mobile-rx
          https://feeshy.top/lists/ms-notes-clients
          https://feeshy.top/smzdm/sonata-hd
          https://feeshy.top/lists/obsidian-plugins
          https://feeshy.top/lists/DAWs
          https://feeshy.top/lists/source-han-fonts
          https://feeshy.top/poetry/blood/kongming
          https://feeshy.top/tech/bnw-film-processing
          https://feeshy.top/tech/redirect-gh-pages
          https://feeshy.top/lists/monospace-fonts-width
          https://feeshy.top/music/headroom-in-arrangement-and-mix
          https://feeshy.top/tech/icons-set-for-website
          https://feeshy.top/lists/free-audio-plugins
          https://feeshy.top/prose/granny-is-a-witch
          https://feeshy.top/music/playlists
          https://feeshy.top/music/illusory-island
          https://feeshy.top/music/racks4live
          https://feeshy.top/music/ends-of-nihil
          EOF

          URL_COUNT=$(wc -l < urls.txt)
          echo "📤 准备提交 $URL_COUNT 个 URL："
          cat urls.txt
          echo ""

          echo "🚀 提交中..."
          HTTP_CODE=$(curl -sS -o baidu_response.txt -w "%{http_code}" \
            -H 'Content-Type:text/plain' \
            --data-binary @urls.txt \
            "http://data.zz.baidu.com/urls?site=https://feeshy.top&token=${BAIDU_TOKEN}")

          echo ""
          echo "📊 Baidu HTTP $HTTP_CODE"
          echo "响应内容："
          cat baidu_response.txt 2>/dev/null || echo "（无响应体）"
          echo ""

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 提交成功！百度会在几小时内处理。"
            exit 0
          else
            echo "❌ 提交失败（HTTP $HTTP_CODE）"
            exit 1
          fi