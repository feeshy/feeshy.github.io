<script>
function qr_event() {
	var qr=document.getElementById("mp_qr").style.cssText;
	if (qr=="display: none;") {
		qr="display: block; width: 128px; height: 128px; background-color: rgba(255,255,255,0.75);";
		document.getElementById("mp_qr").style.cssText=qr;
		document.getElementById("mp_descrip").innerHTML="&#x25BC";
	} 
	else {
		qr="display: none;";
		document.getElementById("mp_qr").style.cssText=qr;
		document.getElementById("mp_descrip").innerHTML="<img src='https://res.wx.qq.com/a/wx_fed/assets/res/NTI4MWU5.ico' alt='订阅号' height=16 />";
	}
}
</script>
